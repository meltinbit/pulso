services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8123:8123"
    environment:
      APP_NAME: "${APP_NAME:-Pulso}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8123"
      APP_KEY: "${APP_KEY:-}"
      APP_TIMEZONE: UTC
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pulso
      DB_USERNAME: pulso
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      GA_CACHE_TTL_CORE: 3600
      GA_CACHE_TTL_REALTIME: 60
      GA_CACHE_TTL_FUNNEL: 7200
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pulso
      MYSQL_USER: pulso
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app-storage:
  mysql-data:
